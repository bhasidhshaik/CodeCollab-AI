services:
  - type: web
    name: codex-server
    runtime: node
    region: singapore
    buildCommand: cd apps/server && npm install --legacy-peer-deps && npm run build
    startCommand: node apps/server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0